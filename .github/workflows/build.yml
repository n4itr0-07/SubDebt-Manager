name: Production APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APKs (Split Architecture)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Expo Android
        run: npx expo prebuild --platform android --clean

      - name: Optimize Build & Enable ABI Splits
        run: |
          GRADLE_FILE="android/app/build.gradle"

          # Enable Proguard/R8 Shrinking (CRITICAL for size reduction)
          sed -i 's/def enableProguardInReleaseBuilds = false/def enableProguardInReleaseBuilds = true/g' "$GRADLE_FILE"

          # Append ABI split config to generate separate APKs
          cat >> "$GRADLE_FILE" << 'GRADLE_PATCH'

          // === CI: Enable ABI Splits ===
          android {
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }
          }
          GRADLE_PATCH

          echo "--- Verifying build.gradle tail ---"
          tail -20 "$GRADLE_FILE"

      - name: Build Release APK
        env:
          EXPO_PUBLIC_EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Collect and Rename APKs
        run: |
          echo "--- APK output listing ---"
          find android/app/build/outputs/apk/release/ -name "*.apk"

          mkdir -p release-apks
          
          for apk in android/app/build/outputs/apk/release/*.apk; do
            if [[ "$apk" != *"unsigned"* ]]; then
              filename=$(basename "$apk")
              new_name=$(echo "$filename" | sed -e 's/app-/SubDebt-/g' -e 's/-release//g')
              mv "$apk" "release-apks/$new_name"
              echo "Prepared: release-apks/$new_name"
            fi
          done

      - name: Verify APK Sizes
        run: |
          for apk in release-apks/*.apk; do
            SIZE_BYTES=$(stat -c%s "$apk")
            SIZE_MB=$((SIZE_BYTES / 1048576))
            echo "$apk size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
            
            if [ "$SIZE_MB" -gt 150 ]; then
              echo "::warning::APK $apk is ${SIZE_MB}MB — exceeds 150MB warning threshold."
            fi
          done
          echo "✅ APK verification complete."

      - name: Generate Release Notes
        id: notes
        run: |
          echo "## 🚀 SubDebt Production Release" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🔥 What's New" >> release_notes.md
          echo "- **Daily Spending Tracker**: Monitor your daily expenses, visualize your habits with a 7-day chart, and build a streak." >> release_notes.md
          echo "- **Quick Add Menu**: A new premium central '+' button that opens a beautiful, haptic-rich staggered animated grid for quick entries." >> release_notes.md
          echo "- **Unified Data Management**: Overhauled settings to safely clear tracking data without losing user preferences, and flawless import/export for all data." >> release_notes.md
          echo "- **UI/UX Polish**: Perfected dark mode styling, fixed Android shadow glitches, dynamic status bar, and expanded 4-slide onboarding." >> release_notes.md
          echo "" >> release_notes.md
          echo "> 📱 **Note**: This release includes separate optimized APKs for different device architectures (\`arm64-v8a\`, \`armeabi-v7a\`, \`x86_64\`) and a universal fallback." >> release_notes.md

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SubDebt-APKs
          path: release-apks/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
