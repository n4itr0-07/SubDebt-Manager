name: Production APK Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Expo Android
        run: npx expo prebuild --platform android --clean

      - name: Force arm64-v8a Architecture
        run: |
          sed -i 's/def enableSeparateBuildPerCPUArchitecture = false/def enableSeparateBuildPerCPUArchitecture = true/g' android/app/build.gradle
          sed -i 's/ndk {/ndk {\n            abiFilters "arm64-v8a"/g' android/app/build.gradle || true

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-arm64-v8a-release.apk SubDebt-arm64.apk || \
          mv android/app/build/outputs/apk/release/app-release.apk SubDebt-arm64.apk || echo "APK not found where expected"

      - name: Generate Release Notes
        id: notes
        run: |
          echo "## 🚀 SubDebt Production Release" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🔥 What's New" >> release_notes.md
          echo "- **Advanced Subscription Tracking**: Automated icons, dynamic expiration progress bars, and custom billing cycle calculations." >> release_notes.md
          echo "- **Intelligent Debt Manager**: Track money owed to you with visual overdue warnings and one-tap payment marking." >> release_notes.md
          echo "- **Production MMKV Storage**: Upgraded to true C++ \`react-native-mmkv\` for blazing fast, synchronous data access." >> release_notes.md
          echo "- **Data Portability**: Full JSON backup and restore system with intelligent merge & replace options." >> release_notes.md
          echo "- **Premium Glassmorphism UX**: Completely custom UI with interactive haptics, spring physics splash screen, and custom bottom-sheet alerts." >> release_notes.md
          echo "" >> release_notes.md
          echo "> 📱 **Note**: This is an \`arm64-v8a\` optimized APK build." >> release_notes.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubDebt-APK
          path: SubDebt-arm64.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: SubDebt-arm64.apk
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
